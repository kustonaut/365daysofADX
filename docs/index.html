        :root {

            --adx-green: #00B294;
            --card-bg: #FFFFFF;
            --text-primary: #1B2A4A;

        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--adx-dark) 0%, #002855 50%, #003D7A 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(80, 230, 255, 0.08);
            animation: float 20s infinite ease-in-out;
        }
        .particle:nth-child(1) { width: 300px; height: 300px; top: 10%; left: -5%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 200px; height: 200px; top: 60%; right: -3%; animation-delay: -5s; }
        .particle:nth-child(3) { width: 150px; height: 150px; top: 30%; right: 20%; animation-delay: -10s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-40px) scale(1.1); opacity: 0.8; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        h1 span {
            background: linear-gradient(90deg, var(--adx-accent), var(--adx-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255,255,255,0.65);
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--adx-accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Action Button */
        .action-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .roll-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 2.5rem;
            font-size: 1.15rem;
            font-weight: 600;
            color: #FFFFFF;
            background: linear-gradient(135deg, var(--adx-blue), #005A9E);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 120, 212, 0.4);
        }

        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 120, 212, 0.6);
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .roll-btn .dice {
            font-size: 1.4rem;
            display: inline-block;
            transition: transform 0.5s ease;
        }

        .roll-btn:hover .dice {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* Filter chips */
        .filter-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .filter-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem;
        }

        .chip {
            padding: 0.35rem 0.85rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background: rgba(255,255,255,0.15);
            color: #FFFFFF;
        }

        .chip.active {
            background: var(--adx-blue);
            border-color: var(--adx-blue);
            color: #FFFFFF;
        }

        .chip .count {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: 0.2rem;
        }

        /* Post Card */

            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.5s ease;
        }

        .card.hidden {
            display: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .day-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--adx-blue), #005A9E);

        }

        .day-badge .day-number {

            font-weight: 700;
            line-height: 1;
        }

        }

            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        }

        .card-category {

        .card-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .card-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;

            text-decoration: none;
            border-radius: 8px;

        }

        .card-btn.primary {
            color: #FFFFFF;
            background: #0A66C2;
        }

        .card-btn.primary:hover {
            background: #004182;
        }

        .card-btn.secondary {
            color: var(--adx-blue);
            background: var(--adx-light);
        }

        .card-btn.secondary:hover {
            background: #D0E8F8;
        }

        .history {
            margin-top: 2rem;

            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;

            font-weight: 700;
            color: var(--adx-accent);

        }

            color: rgba(255,255,255,0.75);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        footer p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
        }

        footer a {
            color: var(--adx-accent);
            text-decoration: none;
        }

        /* Responsive */

            .container { padding: 1.5rem 1rem; }
            h1 { font-size: 1.6rem; }
            .card { padding: 1.5rem; }

        }

        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>

    // Category mapping
    function getCategory(topic) {
        const t = topic.toLowerCase();
        const maps = [
            [["join", "operator", "function", "statement", "command", "plugin", "where", "extend", "project", "summarize", "sort", "between", "contains", "has ", "let ", "datatable", "scan ", "pivot", "materialize", "replace_string", "top-nested", "bin ", "render"], "KQL Fundamentals"],
            [["ingest", "connector", "telegraf", "kafka", "logstash", "opentelemetry", "flink", "splunk", "s3", "blob", "event hub", "eventstream", "cdc", "lightingest", "data format", "pipeline", "fluent-bit", "rabbitmq"], "Data Ingestion"],
            [["chart", "visual", "pie", "bar ", "area", "scatter", "heatmap", "plotly", "dashboard", "grafana", "power bi", "powerbi", "card vis", "3d scatter"], "Visualizations"],
            [["architecture", "multi-tenant", "iot", "automotive", "reference", "pattern", "solution", "e2e", "network", "vnet", "private endpoint", "cache", "retention", "extent", "shard", "performance", "concurrency", "export", "migration", "deploy"], "Architecture & Patterns"],
            [["fabric", "real-time analytics", "rta", "kqldb", "onelake", "delta lake", "data activator"], "Microsoft Fabric"],
            [["security", "defender", "threat", "hunting", "sentinel", "monitor", "anomaly detection", "encryption", "purview", "geolocation"], "Security & Monitoring"],
            [["success story", "customer", "husky", "mobirix", "linkedin", "hilo", "abn amro", "zf plant", "uptake", "buhler", "financial fabric", "playfab"], "Customer Stories"],
            [["emulator", "detective", "web ui", "explorer", "odbc", "rest api", "client librar", "language extension", "python plugin", "kusto.language", "arm template", "power automate", "data share", "cursor"], "Tools & Ecosystem"],
            [["learn", "tutorial", "course", "cheat sheet", "overview", "quick reference", "training", "e-book", "video", "newsletter", "guide", "infographic", "blog", "savill"], "Learning Resources"],
        ];
        for (const [keywords, cat] of maps) {
            if (keywords.some(k => t.includes(k))) return cat;
        }
        return "KQL Fundamentals";
    }

    // Assign categories
    posts.forEach(p => { p.category = getCategory(p.topic); });

    // Category counts
    const catCounts = {};
    posts.forEach(p => { catCounts[p.category] = (catCounts[p.category] || 0) + 1; });

    // State
    let activeFilter = null;
    let history = [];
    let viewedSet = new Set();

    // Try restore from localStorage
    try {
        const saved = localStorage.getItem('365adx_viewed');
        if (saved) viewedSet = new Set(JSON.parse(saved));
    } catch(e) {}

    // === UI ===
    const chipsEl = document.getElementById('chips');
    const categories = ["KQL Fundamentals", "Data Ingestion", "Visualizations", "Architecture & Patterns",
                        "Joins & Operators", "Microsoft Fabric", "Security & Monitoring",
                        "Customer Stories", "Tools & Ecosystem", "Learning Resources"];

    // Build chips
    const allChip = document.createElement('div');
    allChip.className = 'chip active';
    allChip.textContent = 'All';
    allChip.innerHTML = 'All <span class="count">350</span>';
    allChip.onclick = () => setFilter(null);
    chipsEl.appendChild(allChip);

    categories.forEach(cat => {
        if (!catCounts[cat]) return;
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.cat = cat;
        chip.innerHTML = cat + ' <span class="count">' + catCounts[cat] + '</span>';
        chip.onclick = () => setFilter(cat);
        chipsEl.appendChild(chip);
    });

    function setFilter(cat) {
        activeFilter = cat;
        document.querySelectorAll('.chip').forEach(c => {
            if (cat === null) {
                c.classList.toggle('active', !c.dataset.cat);
            } else {
                c.classList.toggle('active', c.dataset.cat === cat);
            }
        });
    }

    function updateViewedCount() {
        document.getElementById('viewed-count').textContent = viewedSet.size;
    }
    updateViewedCount();

    function rollRandom() {
        let pool = activeFilter ? posts.filter(p => p.category === activeFilter) : posts;
        if (pool.length === 0) pool = posts;

        const post = pool[Math.floor(Math.random() * pool.length)];
        showPost(post);

        // Track
        viewedSet.add(post.day);
        updateViewedCount();
        try { localStorage.setItem('365adx_viewed', JSON.stringify([...viewedSet])); } catch(e) {}

        // History
        history = [post, ...history.filter(p => p.day !== post.day)].slice(0, 5);
        renderHistory();
    }

    function showPost(post) {
        const card = document.getElementById('post-card');
        card.classList.remove('hidden');
        // Re-trigger animation
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'slideUp 0.5s ease';

        document.getElementById('card-day').textContent = post.day;
        document.getElementById('card-topic').textContent = post.topic;
        document.getElementById('card-week').textContent = 'Week ' + post.week + ' of 50';
        document.getElementById('card-category').textContent = post.category;
        document.getElementById('card-linkedin').href = post.url;
    }

    function renderHistory() {
        const section = document.getElementById('history-section');
        const list = document.getElementById('history-list');
        if (history.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        list.innerHTML = history.map(p =>
            '<a class="history-item" href="' + p.url + '" target="_blank" rel="noopener">' +
            '<span class="h-day">#' + p.day + '</span>' +
            '<span class="h-topic">' + p.topic + '</span>' +
            '</a>'
        ).join('');
    }

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            rollRandom();
        }
    });

    // Auto-roll on load
    rollRandom();
    </script>
