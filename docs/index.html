  .card {

  .tweet-wrap {
    min-height: 80px; padding: 0.75rem;

  }

    color: #484f58; font-size: 0.8rem; padding: 2rem 0; text-align: center;

  }

let activeCategory = null, currentPost = null;
const viewedSet = new Set(JSON.parse(localStorage.getItem('adx365v') || '[]'));

const $ = id => document.getElementById(id);
const $card = $('card'), $dayNum = $('day-num'), $topic = $('topic');
const $tweetWrap = $('tweet-wrap'), $linkLi = $('link-li'), $linkX = $('link-x');
const $viewed = $('viewed'), $filtersDiv = $('filters');

// — Filters —
const cats = [...new Set(POSTS.map(p => p.category))].sort();
cats.forEach(cat => {
  const c = document.createElement('span');
  c.className = 'chip'; c.textContent = cat;
  c.onclick = () => {
    if (activeCategory === cat) {
      activeCategory = null; c.classList.remove('active');
    } else {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      activeCategory = cat; c.classList.add('active');
    }
  };
  $filtersDiv.appendChild(c);
});

// — Show post —
function showPost(post) {
  currentPost = post;
  $dayNum.textContent = 'Day ' + post.day;
  $topic.textContent = post.topic;
  $linkLi.href = post.linkedin_url;
  $linkX.href = post.x_url;

  // Clear old tweet
  $tweetWrap.innerHTML = '<div class="loading">Loading tweet\u2026</div>';

  // Use createTweet API for reliable rendering
  if (post.tweet_id) {
    twttr.ready(function() {
      $tweetWrap.innerHTML = '';
      twttr.widgets.createTweet(post.tweet_id, $tweetWrap, {
        theme: 'dark', dnt: true, align: 'center', width: 500
      }).then(function(el) {
        if (!el) {
          $tweetWrap.innerHTML = '<div class="loading">Tweet unavailable — use links below</div>';
        }
      }).catch(function() {
        $tweetWrap.innerHTML = '<div class="loading">Tweet unavailable — use links below</div>';
      });
    });
  } else {
    $tweetWrap.innerHTML = '<div class="loading">No tweet ID — use links below</div>';
  }

  viewedSet.add(post.day);
  localStorage.setItem('adx365v', JSON.stringify([...viewedSet]));
  $viewed.textContent = viewedSet.size;
  $card.classList.add('visible');
  $card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function roll() {
  var pool = activeCategory ? POSTS.filter(p => p.category === activeCategory) : POSTS;
  if (!pool.length) pool = POSTS;
  var post, tries = 0;
  do { post = pool[Math.floor(Math.random() * pool.length)]; tries++; }
  while (post === currentPost && pool.length > 1 && tries < 20);
  showPost(post);
}

// — Events —
$('next-btn').onclick = roll;
$('btn-next2').onclick = roll;
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); roll(); }
});

// — Init —
$viewed.textContent = viewedSet.size;
twttr.ready(function() { roll(); });
</script>
